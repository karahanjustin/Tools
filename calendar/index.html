<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calendar // HomeServiceReply</title>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<style>
  :root {
    --bg: #f7f7f8;
    --surface: #ffffff;
    --text: #18181b;
    --muted: #71717a;
    --border: #e8e8ec;
    --border-hover: #d7d7dd;
    --accent: #2563eb;
    --good: #16a34a;
    --warn: #d97706;
    --danger: #dc2626;
    --radius: 14px;
    --shadow-sm: 0 1px 2px rgba(24, 24, 27, 0.05);
    --shadow: 0 8px 30px rgba(24, 24, 27, 0.12);

    --fc-border-color: #ececf0;
    --fc-page-bg-color: #ffffff;
    --fc-neutral-bg-color: #fafafa;
    --fc-today-bg-color: rgba(37, 99, 235, 0.06);
    --fc-event-bg-color: #2563eb;
    --fc-event-border-color: #2563eb;
    --fc-event-text-color: #ffffff;
    --fc-now-indicator-color: #dc2626;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh; background: var(--bg); color: var(--text);
    font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .topbar {
    display: flex; align-items: center; gap: 16px;
    padding: 16px 24px; background: var(--surface); border-bottom: 1px solid var(--border);
  }
  .back {
    color: var(--muted); text-decoration: none; font-size: 13px; font-weight: 500;
    border: 1px solid var(--border); border-radius: 9px; padding: 7px 12px; transition: all 0.15s ease;
  }
  .back:hover { color: var(--text); border-color: var(--border-hover); }
  .topbar h1 { font-size: 17px; font-weight: 660; letter-spacing: -0.01em; }
  .pill {
    margin-left: auto; display: inline-flex; align-items: center; gap: 7px;
    font-size: 12px; font-weight: 500; color: var(--muted);
    border: 1px solid var(--border); background: var(--surface); padding: 6px 12px; border-radius: 999px;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
  .dot.ok { background: var(--good); }
  .dot.warn { background: var(--warn); }

  .cal-wrap { height: calc(100vh - 122px); padding: 20px 24px 28px; max-width: 1240px; margin: 0 auto; }
  #calendar { height: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow-sm); }

  .fc .fc-toolbar-title { font-size: 1.2rem; font-weight: 660; letter-spacing: -0.01em; }
  .fc .fc-button { text-transform: capitalize; font-weight: 500; box-shadow: none !important; border-radius: 8px !important; }
  .fc .fc-button-primary:not(:disabled).fc-button-active,
  .fc .fc-button-primary:not(:disabled):active { background: var(--text); border-color: var(--text); color: #fff; }
  .fc .fc-col-header-cell-cushion { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.03em; padding: 8px 4px; text-decoration: none; }
  .fc .fc-daygrid-day-number, .fc .fc-timegrid-axis-cushion, .fc .fc-timegrid-slot-label-cushion, .fc .fc-list-day-text, .fc .fc-list-day-side-text { color: var(--text); text-decoration: none; }
  .fc .fc-day-today .fc-daygrid-day-number { color: var(--accent); font-weight: 700; }
  .fc-event { cursor: pointer; font-weight: 600; border-radius: 6px; padding: 1px 2px; }
  .fc .fc-list-empty { color: var(--muted); }

  .overlay { position: fixed; inset: 0; background: rgba(24, 24, 27, 0.45); backdrop-filter: blur(3px); display: grid; place-items: center; z-index: 60; padding: 20px; }
  .overlay.hidden { display: none; }
  .card {
    width: 100%; max-width: 420px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 18px; padding: 26px; box-shadow: var(--shadow);
  }
  .card h3 { font-size: 17px; margin-bottom: 6px; letter-spacing: -0.01em; }
  .card .desc { font-size: 13.5px; color: var(--muted); margin-bottom: 18px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .field input, .field textarea {
    width: 100%; background: #fff; color: var(--text); border: 1px solid var(--border);
    border-radius: 9px; padding: 10px 12px; font-size: 14px; font-family: inherit;
  }
  .field input:focus, .field textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.12); }
  .field textarea { resize: vertical; min-height: 62px; }
  .row2 { display: flex; gap: 12px; } .row2 .field { flex: 1; }
  .actions { display: flex; gap: 10px; margin-top: 20px; align-items: center; }
  .actions button { border: 1px solid var(--border); background: #fff; color: var(--text); border-radius: 9px; padding: 10px 16px; font-size: 13.5px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.15s ease; }
  .actions button:hover { border-color: var(--border-hover); }
  .btn-primary { background: var(--accent) !important; color: #fff !important; border-color: var(--accent) !important; }
  .btn-primary:hover { background: #1d4ed8 !important; }
  .btn-danger { color: var(--danger) !important; border-color: #f3c6c6 !important; margin-right: auto; }
  .pinrow { display: flex; gap: 10px; }
  .pinrow input { flex: 1; text-align: center; letter-spacing: 0.4em; font-size: 18px; }
  .pinerr { color: var(--danger); font-size: 12.5px; margin-top: 8px; min-height: 16px; }
</style>
</head>
<body>
  <div class="topbar">
    <a class="back" href="../">&larr; Tools Hub</a>
    <h1>Calendar</h1>
    <span class="pill"><span class="dot" id="dot"></span><span id="status">Locked</span></span>
  </div>

  <div class="cal-wrap">
    <div id="calendar"></div>
  </div>

  <!-- PIN gate -->
  <div class="overlay" id="pin-overlay">
    <div class="card">
      <h3>Enter PIN</h3>
      <div class="desc">Shared team calendar. Enter the PIN to view and edit demos.</div>
      <div class="pinrow">
        <input id="pin-input" type="password" inputmode="numeric" maxlength="8" placeholder="••••" autocomplete="off" />
        <button class="btn-primary" id="pin-go">Unlock</button>
      </div>
      <div class="pinerr" id="pin-err"></div>
    </div>
  </div>

  <!-- event editor -->
  <div class="overlay hidden" id="ev-overlay">
    <div class="card">
      <h3 id="m-title">New event</h3>
      <div class="field"><label for="f-title">Title</label><input id="f-title" type="text" placeholder="e.g. Demo - ABC Plumbing" /></div>
      <div class="field"><label for="f-date">Date</label><input id="f-date" type="date" /></div>
      <div class="row2">
        <div class="field"><label for="f-start">Start</label><input id="f-start" type="time" /></div>
        <div class="field"><label for="f-end">End</label><input id="f-end" type="time" /></div>
      </div>
      <div class="field"><label for="f-notes">Notes</label><textarea id="f-notes" placeholder="Phone, lead info, objections..."></textarea></div>
      <div class="actions">
        <button class="btn-danger" id="f-delete">Delete</button>
        <button id="f-cancel">Cancel</button>
        <button class="btn-primary" id="f-save">Save</button>
      </div>
    </div>
  </div>

<script>
  // ===== Config =====
  const firebaseConfig = {
    apiKey: "AIzaSyBHp9X5ZnA3RIWghnkM_yNiGkRB1HOp5lc",
    authDomain: "hsr-tools-2db6f.firebaseapp.com",
    projectId: "hsr-tools-2db6f",
    storageBucket: "hsr-tools-2db6f.firebasestorage.app",
    messagingSenderId: "773387234948",
    appId: "1:773387234948:web:722015419589ad97a5dcd1"
  };
  // Change this to a PIN you and your caller share:
  const CALENDAR_PIN = "2468";

  const $ = id => document.getElementById(id);
  const pad = n => String(n).padStart(2, "0");
  const toDateVal = d => d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate());
  const toTimeVal = d => pad(d.getHours()) + ":" + pad(d.getMinutes());
  const setStatus = (text, cls) => { $("status").textContent = text; $("dot").className = "dot" + (cls ? " " + cls : ""); };

  let calendar = null, eventsCol = null, editingId = null;

  // ----- PIN gate -----
  function tryUnlock() {
    if ($("pin-input").value === CALENDAR_PIN) {
      sessionStorage.setItem("hsr_cal_ok", "1");
      $("pin-overlay").classList.add("hidden");
      boot();
    } else {
      $("pin-err").textContent = "Wrong PIN.";
      $("pin-input").value = "";
    }
  }
  $("pin-go").onclick = tryUnlock;
  $("pin-input").addEventListener("keydown", e => { if (e.key === "Enter") tryUnlock(); });

  if (sessionStorage.getItem("hsr_cal_ok") === "1") { $("pin-overlay").classList.add("hidden"); boot(); }
  else { setTimeout(() => $("pin-input").focus(), 50); }

  // ----- App -----
  function boot() {
    try {
      firebase.initializeApp(firebaseConfig);
      eventsCol = firebase.firestore().collection("events");
    } catch (e) { setStatus("Config error", "warn"); }

    calendar = new FullCalendar.Calendar($("calendar"), {
      initialView: "dayGridMonth",
      headerToolbar: { left: "prev,next today", center: "title", right: "dayGridMonth,timeGridWeek,timeGridDay,listWeek" },
      height: "100%", nowIndicator: true, selectable: true, selectMirror: true, editable: true,
      dayMaxEvents: true, slotMinTime: "06:00:00", slotMaxTime: "23:00:00", scrollTime: "08:00:00",
      select: info => openNew(info.start, info.end, info.allDay),
      eventClick: info => openEdit(info.event),
      eventDrop: saveFromEvent, eventResize: saveFromEvent
    });
    calendar.render();

    if (eventsCol) {
      setStatus("Connecting...", "warn");
      eventsCol.onSnapshot(
        snap => {
          calendar.removeAllEvents();
          snap.forEach(doc => {
            const d = doc.data();
            calendar.addEvent({ id: doc.id, title: d.title, start: d.start, end: d.end, extendedProps: { notes: d.notes || "" } });
          });
          setStatus("Synced", "ok");
        },
        err => { console.warn("Firestore:", err); setStatus("Offline", "warn"); }
      );
    }
  }

  function openNew(start, end, allDay) {
    editingId = null;
    $("m-title").textContent = "New event";
    $("f-title").value = ""; $("f-notes").value = "";
    $("f-date").value = toDateVal(start);
    if (allDay) { $("f-start").value = "10:00"; $("f-end").value = "10:30"; }
    else { $("f-start").value = toTimeVal(start); $("f-end").value = toTimeVal(end || new Date(start.getTime() + 30 * 60000)); }
    $("f-delete").style.display = "none";
    showEv();
  }
  function openEdit(ev) {
    editingId = ev.id;
    const s = ev.start, e = ev.end || new Date(s.getTime() + 30 * 60000);
    $("m-title").textContent = "Edit event";
    $("f-title").value = ev.title; $("f-notes").value = ev.extendedProps.notes || "";
    $("f-date").value = toDateVal(s); $("f-start").value = toTimeVal(s); $("f-end").value = toTimeVal(e);
    $("f-delete").style.display = "inline-block";
    showEv();
  }
  function showEv() { $("ev-overlay").classList.remove("hidden"); setTimeout(() => $("f-title").focus(), 30); }
  function hideEv() { $("ev-overlay").classList.add("hidden"); editingId = null; }

  function saveFromEvent(info) {
    const e = info.event;
    if (!eventsCol) return;
    eventsCol.doc(e.id).set({
      title: e.title,
      start: e.start ? e.start.toISOString() : null,
      end: e.end ? e.end.toISOString() : null,
      notes: e.extendedProps.notes || ""
    }, { merge: true });
  }

  $("f-save").onclick = () => {
    const title = ($("f-title").value || "").trim() || "(no title)";
    const date = $("f-date").value; if (!date) return;
    const st = $("f-start").value || "10:00";
    const en = $("f-end").value;
    const start = new Date(date + "T" + st);
    let end = en ? new Date(date + "T" + en) : new Date(start.getTime() + 30 * 60000);
    if (end <= start) end = new Date(start.getTime() + 30 * 60000);
    const data = { title, start: start.toISOString(), end: end.toISOString(), notes: $("f-notes").value || "" };
    if (!eventsCol) { setStatus("Offline", "warn"); hideEv(); return; }
    const ref = editingId ? eventsCol.doc(editingId) : eventsCol.doc();
    ref.set(data, { merge: true });
    hideEv();
  };
  $("f-delete").onclick = () => { if (editingId && eventsCol) eventsCol.doc(editingId).delete(); hideEv(); };
  $("f-cancel").onclick = hideEv;
  $("ev-overlay").onclick = e => { if (e.target === $("ev-overlay")) hideEv(); };
  document.addEventListener("keydown", e => { if (e.key === "Escape") hideEv(); });
</script>
</body>
</html>
